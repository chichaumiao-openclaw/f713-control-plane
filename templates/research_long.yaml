schema_version: 1
task_id: ${task_id}
title: ${title}
task_class: research_long
project_ref: ${project_ref}
created_by: ${created_by}
launch:
  mode: ${launch_mode}
  working_dir: ${working_dir}
  entrypoint: ${entrypoint}
  prompt: ${prompt}
  codex_profile: agnes
inputs: []
expected_outputs: []
completion_checks:
  - "comparison packet generated"
watchdog:
  enabled: false
  interval_min: 5
  max_retries: 0
  stall_cutoff: 0
notify:
  feishu: true
human_gate:
  required: true
